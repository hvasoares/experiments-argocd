# Team-tier overlay for the bitnami/postgresql dependency pinned in Chart.yaml.
# Isolation rule (data-model.md § Wrapper Chart Dependency / Add-on Toggle):
# this instance MUST stay in its own "team" namespace and MUST NOT share a
# Service/Secret with platform-addons/default-add-ons/postgresql, whose
# metrics.enabled defaults to false.
namespace: team

postgresql:
  # Must match default-add-ons/outline/values.yaml's externalPostgresql.database
  # (Outline connects to this database name specifically, per the isolation
  # contract - the bitnami chart does not create it unless named here).
  #
  # postgresPassword is pinned (not left "") because the bitnami chart
  # generates a fresh random password on every `helm template` render when
  # unset. Argo CD re-renders on every synced commit, so an unpinned
  # password rewrites the live Secret with a new value each time - while
  # the already-initialized Postgres data volume still has the OLD
  # password baked in (initdb only runs once), breaking every client with
  # "password authentication failed". Playground-only fixed value, not a
  # real credential.
  auth:
    database: outline
    postgresPassword: outline-team-local-playground-pw
  metrics:
    enabled: true
