---
# Platform-tier defaults passed through to the bitnami/postgresql
# dependency declared in Chart.yaml. Overrides from
# customAddons.platform.postgresql.values (see contracts/child-to-leaf-application.md)
# are deep-merged on top of these at the leaf Application level.
postgresql:
  # postgresPassword/password are pinned (not left unset) because the
  # bitnami chart generates a fresh random password on every `helm
  # template` render otherwise. Argo CD re-renders on every synced commit,
  # which would rewrite the live Secret each time while the
  # already-initialized data volume keeps the OLD password - breaking
  # every client. Playground-only fixed values, not real credentials.
  auth:
    username: platform
    password: platform-local-playground-pw
    postgresPassword: platform-local-playground-pw
    database: platform
    existingSecret: ""
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 8Gi
  # Platform tier runs without the metrics sidecar/ServiceMonitor by
  # default (data-model.md § Wrapper Chart Dependency); the team tier
  # overlay flips this on.
  metrics:
    enabled: false
