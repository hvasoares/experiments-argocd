{{/*
postgresql.yaml
----------------
Leaf Argo CD Application for the platform-tier PostgreSQL instance,
sourced from the default-add-ons/postgresql wrapper chart (T018), which
itself pins the bitnami/postgresql dependency.

Gated by .Values.customAddons.platform.postgresql.enable (data-model.md
§ Add-on Toggle) so this Application only renders when explicitly turned
on. `default dict` guards every lookup so this chart still
`helm lint`/`helm template`s standalone before values.yaml's
customAddons.platform.postgresql block has been populated (T021), per
Constitution Principle II.

Fields follow contracts/child-to-leaf-application.md § Producer exactly:
metadata.name, spec.destination.namespace, spec.source.path, and
spec.source.helm.values are all sourced from the toggle entry, falling
back to the add-on-path helper (T008) for the wrapper chart path and to
the "platform" namespace called out in this task when no override is set.
*/}}
{{- $pg := .Values.customAddons.platform.postgresql | default dict }}
{{- if $pg.enable }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-platform
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $pg.namespace | default "platform" }}
  source:
    repoURL: {{ .Values.repoURL | default "https://example.com/local-single-repo-placeholder.git" }}
    path: {{ $pg.chartPath | default (include "add-on-path" "postgresql") }}
    targetRevision: {{ $pg.targetRevision | default "HEAD" }}
    helm:
      values: |-
        {{- toYaml ($pg.values | default dict) | nindent 8 }}
  syncPolicy:
    automated: {}
{{- end }}
