# Registered child app-of-apps charts, keyed by app name.
# See data-model.md § Registered App for the field contract and
# contracts/parent-to-child-values.md for what gets passed down to each child.
apps:
  platform-addons:
    enabled: true
    # This experiment runs entirely out of one repo (monorepo), so every
    # child chart is a sibling path in the same Git remote. Public HTTPS
    # URL - no credentials needed for Argo CD's repo-server to clone it.
    repoURL: https://github.com/hvasoares/experiments-argocd.git
    path: platform-addons
    targetRevision: HEAD
  team-addons:
    enabled: true
    # Same single-repo, public-HTTPS setup as platform-addons above.
    repoURL: https://github.com/hvasoares/experiments-argocd.git
    path: team-addons
    targetRevision: HEAD
